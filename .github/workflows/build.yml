name: Build Signed APK & AAB

on:
  push:
    branches: ["*"]

permissions:
  contents: read

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore from secrets
        run: echo "${{ secrets.MorphCosmicBase64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.MorphCosmicStorePassword }}
          keyPassword=${{ secrets.MorphCosmicKeyPassword }}
          keyAlias=${{ secrets.MorphCosmicKeyAlias }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed APK
        run: flutter build apk --release

      - name: Build signed AAB
        run: flutter build appbundle --release

      - name: Remove keystore and key.properties
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
